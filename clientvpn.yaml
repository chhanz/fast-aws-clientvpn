AWSTemplateFormatVersion: "2010-09-09"
Description: >
  AWS Client VPN endpoint (mutual / certificate authentication).
  Split Tunnel by default; full-tunnel route (0.0.0.0/0) is created only when SplitTunnel=false.

Parameters:
  ServerCertArn:
    Type: String
    Description: ACM ARN of the server certificate (same CA also used as client root chain).
  ClientCidr:
    Type: String
    Description: Client CIDR block assigned to VPN clients (e.g. 10.100.0.0/22).
  VpcId:
    Type: AWS::EC2::VPC::Id
    Description: VPC that hosts the associated subnet.
  SubnetId:
    Type: AWS::EC2::Subnet::Id
    Description: Subnet to associate with the Client VPN endpoint.
  TargetCidr:
    Type: String
    Description: On-prem / internal CIDR to authorize (e.g. 172.31.0.0/16).
  SplitTunnel:
    Type: String
    Default: "true"
    AllowedValues:
      - "true"
      - "false"
    Description: >
      true = split tunnel (only TargetCidr over VPN). false = full tunnel
      (0.0.0.0/0 route added). Split tunnel must NOT have a 0.0.0.0/0 route.

Conditions:
  # Create the 0.0.0.0/0 route only in full tunnel mode.
  # In split tunnel mode a 0.0.0.0/0 route risks dropping client connectivity.
  IsFullTunnel: !Equals [ !Ref SplitTunnel, "false" ]

Resources:
  ClientVpnEndpoint:
    Type: AWS::EC2::ClientVpnEndpoint
    Properties:
      Description: Managed by mgt-clientvpn.sh
      ServerCertificateArn: !Ref ServerCertArn
      ClientCidrBlock: !Ref ClientCidr
      SplitTunnel: !Ref SplitTunnel
      AuthenticationOptions:
        - Type: certificate-authentication
          MutualAuthentication:
            # Server and client are signed by the same CA, so the server cert ARN is reused as the client root chain.
            ClientRootCertificateChainArn: !Ref ServerCertArn
      # ConnectionLogOptions is required. Stack creation fails if it is omitted.
      ConnectionLogOptions:
        Enabled: false
      TagSpecifications:
        - ResourceType: client-vpn-endpoint
          Tags:
            - Key: Name
              Value: !Sub "${AWS::StackName}-endpoint"

  TargetNetworkAssociation:
    Type: AWS::EC2::ClientVpnTargetNetworkAssociation
    Properties:
      ClientVpnEndpointId: !Ref ClientVpnEndpoint
      SubnetId: !Ref SubnetId

  AuthorizationRule:
    Type: AWS::EC2::ClientVpnAuthorizationRule
    # Create the authorization rule only after the subnet association completes (a rule created before association causes intermittent failures).
    DependsOn: TargetNetworkAssociation
    Properties:
      ClientVpnEndpointId: !Ref ClientVpnEndpoint
      TargetNetworkCidr: !Ref TargetCidr
      AuthorizeAllGroups: true
      Description: Authorize access to the internal target network.

  FullTunnelRoute:
    Type: AWS::EC2::ClientVpnRoute
    Condition: IsFullTunnel
    # Create the route only after the subnet association completes.
    DependsOn: TargetNetworkAssociation
    Properties:
      ClientVpnEndpointId: !Ref ClientVpnEndpoint
      DestinationCidrBlock: 0.0.0.0/0
      TargetVpcSubnetId: !Ref SubnetId
      Description: Full tunnel default route (only when SplitTunnel=false).

Outputs:
  ClientVpnEndpointId:
    Description: Client VPN endpoint ID.
    Value: !Ref ClientVpnEndpoint
  TunnelMode:
    Description: Resolved tunnel mode.
    Value: !If [ IsFullTunnel, "full-tunnel", "split-tunnel" ]
  ServerCertArn:
    Description: Server certificate ARN in use.
    Value: !Ref ServerCertArn
